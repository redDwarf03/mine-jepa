# Hyperparameters — Phase 2: action-conditioned world model
# All Phase 2 scripts read this file.

data:
  path: data/crafter/episodes.npz

encoder:
  checkpoint: checkpoints/encoder_phase1.pt   # frozen Phase 1 encoder

model:
  embed_dim: 128      # must match Phase 1 encoder
  n_actions: 17       # Crafter: 17 discrete actions
  action_dim: 32      # action embedding dimension
  hidden_dim: 256     # predictor MLP channels

training:
  epochs: 30
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-5
  num_workers: 0

logging:
  log_every: 20

checkpoint:
  dir: checkpoints/
  name: wm_phase2.pt

eval:
  max_k: 10       # max latent rollout length for multi-step eval
  n_sequences: 1000  # number of sequences used for eval
