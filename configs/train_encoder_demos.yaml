# JEPA encoder retrained on MineRL human demos (Zenodo, 453k frames)
# Expert data (coherent) vs random → better representations

data:
  path: data/minerl_goal/episodes.npz

model:
  embed_dim: 128
  hidden_dim: 64
  predictor_hidden: 256

training:
  epochs: 30
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-5
  ema_decay: 0.99
  num_workers: 0

vicreg:
  std_coeff: 1.0
  cov_coeff: 0.04

logging:
  log_every: 10
  collapse_threshold: 1.0e-4

checkpoint:
  dir: checkpoints/
  name: encoder_demos.pt
