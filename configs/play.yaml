# Hyperparameters — Phase 3: latent MPC agent in Crafter

encoder:
  checkpoint: checkpoints/encoder_phase1.pt

world_model:
  checkpoint: checkpoints/wm_phase2.pt

planner:
  n_candidates: 512   # candidate action sequences per step
  horizon: 12         # number of steps imagined ahead
  n_actions: 17       # Crafter: 17 discrete actions

goal:
  # Dataset frames with food >= 7 are used to build the goal embedding.
  # "high food" ≈ agent has eaten a plant recently = good survival state.
  data_path: data/crafter/episodes.npz
  label: food         # label used to select "goal" frames
  threshold: 7        # min value to qualify as "good state"
  min_frames: 50      # at least N frames to compute the centroid

agent:
  episodes: 50
  max_steps: 500      # max steps per episode (Crafter default limit)
  seed: 0

logging:
  print_every: 10     # print stats every N episodes
  save_gif: true
  gif_episodes: 3     # number of episodes to record as GIF
  gif_path: assets/agent_play.gif
