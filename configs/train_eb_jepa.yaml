# Phase 4c — Action-conditioned world model (Meta's eb_jepa)
# Encoder + predictor trained JOINTLY, conditioned on action.
# Data: human demos from Zenodo (453k frames).

data:
  path: data/minerl_goal/episodes.npz
  num_frames: 8           # ORIGINAL recipe (50% agent). T=12 over-trained the WM → 0%
  subsample: 4            # ORIGINAL. subsample=2 (2× data) lowered ratio but broke the agent
  val_fraction: 0.1

model:                     # v1 architecture: 664K params → ratio ~0.929 → 50% success
  embed_dim: 64           # v2 (128) regressed to 5%; bigger latent breaks MPC coverage
  encoder_hidden: 32
  n_actions: 17
  action_embed_dim: 16
  predictor_hidden: 128

regularizer:               # anti-collapse (risk #1, see CLAUDE.md)
  std_coeff: 10.0          # VICReg variance (hinge std) — strong to counter collapse
  cov_coeff: 1.0           # VICReg covariance (decorrelation)
  sim_coeff_t: 0.0         # temporal similarity (0 = OFF, otherwise worsens collapse)

# ⚠️ COUNTERINTUITIVE: lower WM ratio = WORSE agent here. Over-training the WM
# (more epochs / more data / longer T) makes the planner copy the STATIC pose of
# success frames (a6=attack-only, 76% of reward>0 frames) instead of the GESTURE
# that earns reward (a14=move+attack). Sweet spot: ratio ~0.929, NOT lower.
#   ratio 0.929 (T=8,  20ep) → 50%   ✅
#   ratio 0.890 (T=12, 25ep, embed128) → 5%
#   ratio 0.882 (T=12, 25ep, embed64)  → ~0%
training:
  epochs: 20              # ORIGINAL. 25ep over-trains (ratio drops below the sweet spot)
  batch_size: 64
  lr: 3.0e-4
  weight_decay: 1.0e-5
  num_workers: 0

logging:
  log_every: 1
  collapse_threshold: 1.0e-4

checkpoint:
  dir: checkpoints/
  name: ebwm.pt
