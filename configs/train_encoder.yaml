# Hyperparamètres — Phase 1 : entraînement encodeur JEPA sur Crafter
# Tous les scripts Phase 1 lisent ce fichier. Ne hardcoder aucune valeur dans le code.

data:
  path: data/crafter/episodes.npz

model:
  embed_dim: 128       # dimension de l'espace latent
  hidden_dim: 64       # canaux intermédiaires du ResNet5
  predictor_hidden: 256

training:
  epochs: 30
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-5
  ema_decay: 0.99      # θ̄ ← 0.99·θ̄ + 0.01·θ (ESANN 2025)
  num_workers: 0

vicreg:
  std_coeff: 1.0       # poids de la pénalité de variance (anti-collapse)
  cov_coeff: 0.04      # poids de la pénalité de covariance (décorrélation)

logging:
  log_every: 10        # loguer toutes les N batches
  collapse_threshold: 1.0e-4  # batch_var < seuil → alerte collapse

checkpoint:
  dir: checkpoints/
  name: encoder_phase1.pt
