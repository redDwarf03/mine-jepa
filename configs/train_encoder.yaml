# Hyperparameters — Phase 1: JEPA encoder training on Crafter
# All Phase 1 scripts read this file. Never hardcode values in code.

data:
  path: data/crafter/episodes.npz

model:
  embed_dim: 128       # latent space dimension
  hidden_dim: 64       # intermediate channels in ResNet5
  predictor_hidden: 256

training:
  epochs: 30
  batch_size: 256
  lr: 3.0e-4
  weight_decay: 1.0e-5
  ema_decay: 0.99      # θ̄ ← 0.99·θ̄ + 0.01·θ (ESANN 2025)
  num_workers: 0

vicreg:
  std_coeff: 1.0       # weight of variance penalty (anti-collapse)
  cov_coeff: 0.04      # weight of covariance penalty (decorrelation)

logging:
  log_every: 10        # log every N batches
  collapse_threshold: 1.0e-4  # batch_var < threshold → collapse alert

checkpoint:
  dir: checkpoints/
  name: encoder_phase1.pt
